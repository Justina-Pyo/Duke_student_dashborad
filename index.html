<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Dorm Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Nunito:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #eef2f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    padding: 24px;
  }

  h1 {
    font-size: 1.5rem;
    color: #2c4a6e;
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }

  .status {
    background: white;
    border: 2px solid #b8cfe8;
    border-radius: 10px;
    padding: 8px 24px;
    margin-bottom: 16px;
    font-size: 0.95rem;
    color: #555;
  }

  .status code {
    font-family: 'DM Mono', monospace;
    color: #c0593a;
    font-size: 1.05rem;
  }

  .map-wrap {
    position: relative;
    display: inline-block;
    max-width: 700px;
    width: 100%;
  }

  .map-wrap img {
    width: 100%;
    display: block;
    border-radius: 16px;
    pointer-events: none;
    user-select: none;
  }

  .dorm-zone {
    position: absolute;
    cursor: pointer;
    border-radius: 10px;
    border: 2px solid transparent;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }

  .dorm-zone:hover {
    background: rgba(100, 160, 210, 0.3);
    border-color: rgba(74, 112, 150, 0.6);
    box-shadow: 0 0 12px rgba(74, 112, 150, 0.35);
  }

  .dorm-zone.active {
    background: rgba(192, 89, 58, 0.25);
    border-color: rgba(192, 89, 58, 0.8);
    box-shadow: 0 0 16px rgba(192, 89, 58, 0.4);
  }

  .nav-btn {
    background: white;
    border: 2px solid #b8cfe8;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 1.2rem;
    color: #2c4a6e;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }

  .nav-btn:hover {
    background: #2c4a6e;
    color: white;
    border-color: #2c4a6e;
  }
</style>
</head>
<body>

<h1>Select your dorm!</h1>
<div class="status">Dorm Chosen: <code id="display"></code></div>

<div style="display: flex; align-items: center; gap: 16px;">
  <button class="nav-btn" onclick="location.href=duke_dashboard_new_design.html">&#8592;</button>
  <div class="map-wrap" id="map">
    <img src="Map2.png" alt="Campus Map">
  </div>
  <!-- ↓ passes selected dorm as URL param to ranking page -->
  <button class="nav-btn" onclick="goNext()">&#8594;</button>
</div>

<script>
  let dorm_var = null;

  const dorms = [
    { label: "Bell Tower",     value: "bell_tower",     l: 17,   t: 8,  w: 20, h: 26 },
    { label: "Randolph",       value: "randolph",       l: 36,   t: 14, w: 17, h: 20 },
    { label: "Trinity",        value: "trinity",        l: 3,    t: 28, w: 16, h: 20 },
    { label: "Southgate",      value: "southgate",      l: 11,   t: 47, w: 22, h: 24 },
    { label: "Blackwell",      value: "blackwell",      l: 40,   t: 35, w: 20, h: 22 },
    { label: "Gilbert-Addoms", value: "gilbert_addoms", l: 30,   t: 60, w: 24, h: 24 },
    { label: "Pegram",         value: "pegram",         l: 60,   t: 10, w: 15, h: 20 },
    { label: "Alspaugh",       value: "alspaugh",       l: 59,   t: 30, w: 17, h: 20 },
    { label: "Giles",          value: "giles",          l: 61,   t: 48, w: 18, h: 18 },
    { label: "West House",     value: "west_house",     l: 63.5, t: 67, w: 18, h: 22 },
    { label: "Bassett",        value: "bassett",        l: 76,   t: 12, w: 24, h: 18 },
    { label: "Brown",          value: "brown",          l: 76,   t: 30, w: 22, h: 20 },
    { label: "Wilson",         value: "wilson",         l: 77,   t: 48, w: 22, h: 18 },
  ];

  const map = document.getElementById('map');
  const display = document.getElementById('display');

  // Navigate to ranking page, carrying the selected dorm as a URL param
  function goNext() {
    const url = dorm_var
      ? `ranking.html?dorm=${dorm_var}`
      : 'ranking.html';
    location.href = url;
  }

  function setActive(index) {
    document.querySelectorAll('.dorm-zone').forEach(z => z.classList.remove('active'));
    const d = dorms[index];
    dorm_var = d.value;
    display.textContent = d.label;
    document.querySelectorAll('.dorm-zone')[index].classList.add('active');
  }

  dorms.forEach((d, i) => {
    const zone = document.createElement('div');
    zone.className = 'dorm-zone';
    zone.style.left   = d.l + '%';
    zone.style.top    = d.t + '%';
    zone.style.width  = d.w + '%';
    zone.style.height = d.h + '%';

    zone.addEventListener('click', () => {
      if (dorm_var === d.value) {
        dorm_var = null;
        display.textContent = '';
        zone.classList.remove('active');
        return;
      }
      setActive(i);
    });

    map.appendChild(zone);
  });
</script>

</body>
</html>
