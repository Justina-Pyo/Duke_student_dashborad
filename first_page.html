<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dorm Energy Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Nunito:wght@700&display=swap');

    body {
      margin: 0;
      background: #eef2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
    }

    /* Key: relative container sized to the image */
    .container {
      position: relative;
      display: inline-block;
      width: 80vw;
      max-width: 900px;
      border-radius: 16px;
      overflow: hidden;
    }

    .container img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
      pointer-events: none;
      user-select: none;
    }

    /* Fullscreen: fill screen edge to edge */
    :fullscreen .container,
    :-webkit-full-screen .container {
      width: 100vw;
      max-width: 100vw;
      border-radius: 0;
    }
    :fullscreen .container img,
    :-webkit-full-screen .container img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    /* Overlay anchored to the container */
    .overlay {
      position: absolute;
      top: 65%;
      left: 60%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 10;
    }

    .fs-corner {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 10;
    }

    button {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: clamp(0.6rem, 1.4vw, 1.2rem);
      letter-spacing: 0.1em;
      padding: clamp(6px, 1vw, 12px) clamp(12px, 2vw, 26px);
      border-radius: 50px;
      border: none;
      cursor: pointer;
      background: #fff;
      color: #1a6a9a;
      display: flex;
      align-items: center;
      gap: clamp(4px, 0.6vw, 10px);
      white-space: nowrap;
      box-shadow: 0 4px 18px rgba(0,0,0,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 26px rgba(0,0,0,0.28);
    }

    button:active { transform: translateY(0); }
  </style>
</head>
<body>

<script>
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
</script>

  <div class="container">
    <img src="introPic2.png" alt="Dorm Energy Tracker" />

    <div class="overlay">
      <button onclick="location.href='map.html'">Next &nbsp;→</button>
    </div>

    <div class="fs-corner">
      <button onclick="toggleFullscreen()">Fullscreen [ ]</button>
    </div>
  </div>

</body>
</html>
